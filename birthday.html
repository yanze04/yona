<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday 🎂</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        *, *::after, *::before { padding: 0; margin: 0; box-sizing: border-box; }

        html, body {
            min-height: 100%;
            width: 100%;
            font-family: 'Quicksand', sans-serif;
            color: #ffffff;
            background-color: #000;
            overflow-x: hidden;
        }

        .stars-bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at top, #0d0020 0%, #000 100%);
            z-index: 0;
        }

        /* PAGE GRID — stacked on mobile, side by side on desktop */
        .page-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 16px 60px;
            gap: 32px;
            position: relative;
            z-index: 10;
        }

        @media (min-width: 960px) {
            .page-grid {
                display: grid;
                grid-template-columns: 1.1fr 0.9fr;
                align-items: start;
                padding: 40px;
                gap: 40px;
            }
        }

        /* ── LEFT: FLOWER GARDEN ── */
        .left-flower-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            position: relative;
            width: 100%;
            height: 420px;
            background: linear-gradient(to bottom, rgba(5,0,15,0.2), rgba(5,1,7,0.85));
            border-radius: 24px;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8), 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            flex-shrink: 0;
        }

        @media (min-width: 960px) {
            .left-flower-container { height: 600px; border-radius: 28px; }
        }

        .night {
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(ellipse at top, transparent 0%, #000),
                repeating-linear-gradient(220deg, #000 0px, #000 19px, transparent 19px, transparent 22px),
                repeating-linear-gradient(189deg, #000 0px, #000 19px, transparent 19px, transparent 22px),
                repeating-linear-gradient(148deg, #000 0px, #000 19px, transparent 19px, transparent 22px),
                linear-gradient(90deg, rgb(0,255,250), rgb(240,240,240));
            filter: blur(0.1vmin);
            z-index: 1;
        }

        .dialogue-bubble {
            position: absolute;
            background: rgba(235,47,86,0.12);
            border: 2px solid #ff2151;
            padding: 8px 14px;
            border-radius: 25px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #ffb4e8;
            text-align: center;
            white-space: normal;
            max-width: 40%;
            box-shadow: 0 0 15px rgba(255,33,81,0.4), inset 0 0 10px rgba(255,33,81,0.2);
            opacity: 0;
            z-index: 50;
            animation: floatBubbleUp 8s infinite linear;
        }
        .bubble--1 { left: 4%;  top: 15%; animation-delay: 0s; }
        .bubble--2 { right: 4%; top: 12%; animation-delay: 2s; }
        .bubble--3 { left: 4%;  bottom: 22%; animation-delay: 4s; }
        .bubble--4 { right: 4%; bottom: 25%; animation-delay: 6s; }
        .dialogue-bubble span { display: block; font-size: 0.65rem; margin-top: 3px; color: #ff2151; }

        @keyframes floatBubbleUp {
            0%   { transform: translateY(100px) scale(0.9); opacity: 0; }
            15%  { opacity: 1; transform: translateY(30px) scale(1); }
            85%  { opacity: 1; }
            100% { transform: translateY(-80px) scale(0.95); opacity: 0; }
        }

        .flowers {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 10px;
            z-index: 2;
        }

        .flower { position: absolute; bottom: 0; transform-origin: bottom center; }

        .stem {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            border-radius: 3px;
            background: linear-gradient(to top, #0d5e62, #39c6d6);
            transform-origin: bottom center;
            animation: sway 4s ease-in-out infinite;
        }

        /* mobile stem heights */
        .flower--1 .stem { height: 140px; }
        .flower--2 .stem { height: 110px; }
        .flower--3 .stem { height: 125px; }
        .flower--1 { left: calc(50% - 28px); }
        .flower--2 { left: calc(50% + 28px); animation-delay: 0.5s; }
        .flower--3 { left: calc(50% - 70px); animation-delay: 1s; }

        /* desktop stem heights */
        @media (min-width: 960px) {
            .flower--1 .stem { height: 220px; }
            .flower--2 .stem { height: 180px; }
            .flower--3 .stem { height: 200px; }
            .flower--1 { left: calc(50% - 40px); }
            .flower--2 { left: calc(50% + 40px); }
            .flower--3 { left: calc(50% - 100px); }
        }

        @keyframes sway {
            0%,100% { transform: translateX(-50%) rotate(-2deg); }
            50%      { transform: translateX(-50%) rotate(2deg); }
        }

        .petals { position: absolute; width: 0; height: 0; transform-origin: bottom center; }
        .flower--1 .petals { bottom: 140px; left: 50%; }
        .flower--2 .petals { bottom: 110px; left: 50%; }
        .flower--3 .petals { bottom: 125px; left: 50%; }

        @media (min-width: 960px) {
            .flower--1 .petals { bottom: 220px; }
            .flower--2 .petals { bottom: 180px; }
            .flower--3 .petals { bottom: 200px; }
        }

        .petal {
            position: absolute;
            width: 20px; height: 32px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            background: linear-gradient(to top, #54b8aa, #a7ffee);
            opacity: 0.9;
            transform-origin: bottom center;
            box-shadow: inset 0 0 6px rgba(255,255,255,0.4);
            animation: petalSway 4s ease-in-out infinite;
        }

        @media (min-width: 960px) {
            .petal { width: 28px; height: 44px; }
        }

        .petal:nth-child(1) { transform: rotate(0deg)   translateY(-16px); }
        .petal:nth-child(2) { transform: rotate(60deg)  translateY(-16px); }
        .petal:nth-child(3) { transform: rotate(120deg) translateY(-16px); }
        .petal:nth-child(4) { transform: rotate(180deg) translateY(-16px); }
        .petal:nth-child(5) { transform: rotate(240deg) translateY(-16px); }
        .petal:nth-child(6) { transform: rotate(300deg) translateY(-16px); }

        .flower--2 .petal { background: linear-gradient(to top, #aa54b8, #eea7ff); }
        .flower--3 .petal { background: linear-gradient(to top, #b8aa54, #ffeea7); }

        @keyframes petalSway {
            0%,100% { filter: brightness(1); }
            50%      { filter: brightness(1.15); }
        }

        .flower-center {
            position: absolute;
            width: 16px; height: 10px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffe812, #ffa500);
            transform: translate(-50%, -50%);
            box-shadow: 0 0 8px rgba(255,220,0,0.6);
        }

        .leaf-left, .leaf-right {
            position: absolute;
            width: 24px; height: 15px;
            border-radius: 50% 0 50% 0;
            background: linear-gradient(to top, #0d5e62, #39c6d6);
            transform-origin: right center;
        }
        .leaf-left  { left: -22px; transform: rotate(-40deg); }
        .leaf-right { left: 6px;   transform: rotate(40deg) scaleX(-1); border-radius: 0 50% 0 50%; }

        .flower-light {
            position: absolute;
            width: 5px; height: 5px;
            border-radius: 50%;
            background: #fffd00;
            animation: lightFloat 4s linear infinite;
            opacity: 0;
        }
        .flower-light:nth-child(odd)  { background: #23f0ff; }
        .flower-light:nth-child(1) { left: -8px; animation-delay: 0.5s; }
        .flower-light:nth-child(2) { left:  4px; animation-delay: 1.2s; }
        .flower-light:nth-child(3) { left: -4px; animation-delay: 2s; }
        .flower-light:nth-child(4) { left:  8px; animation-delay: 3s; }

        @keyframes lightFloat {
            0%   { opacity: 0; transform: translateY(0); }
            20%  { opacity: 1; }
            80%  { opacity: 0.5; }
            100% { opacity: 0; transform: translateY(-60px); }
        }

        .grass {
            position: absolute;
            bottom: 0;
            width: 5px;
            border-radius: 3px 3px 0 0;
            background: linear-gradient(to top, #0d5e62, #39c6d6);
            transform-origin: bottom center;
            animation: grassSway 3s ease-in-out infinite;
        }
        .grass:nth-child(1) { left: calc(50% - 55px); height: 38px; animation-delay: 0.2s; }
        .grass:nth-child(2) { left: calc(50% - 40px); height: 28px; animation-delay: 0.8s; }
        .grass:nth-child(3) { left: calc(50% + 38px); height: 34px; animation-delay: 0.4s; }
        .grass:nth-child(4) { left: calc(50% + 55px); height: 26px; animation-delay: 1.2s; }
        .grass:nth-child(5) { left: calc(50% - 88px); height: 30px; animation-delay: 0.6s; }
        .grass:nth-child(6) { left: calc(50% + 80px); height: 28px; animation-delay: 1s;   }

        @media (min-width: 960px) {
            .grass:nth-child(1) { left: calc(50% - 80px);  height: 60px; }
            .grass:nth-child(2) { left: calc(50% - 65px);  height: 45px; }
            .grass:nth-child(3) { left: calc(50% + 60px);  height: 55px; }
            .grass:nth-child(4) { left: calc(50% + 80px);  height: 40px; }
            .grass:nth-child(5) { left: calc(50% - 130px); height: 50px; }
            .grass:nth-child(6) { left: calc(50% + 120px); height: 48px; }
        }

        @keyframes grassSway {
            0%,100% { transform: rotate(-3deg); }
            50%      { transform: rotate(3deg); }
        }

        /* ── RIGHT: ENVELOPE ── */
        .right-envelope-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding-bottom: 220px;
            overflow: visible;
        }

        @media (min-width: 960px) {
            .right-envelope-container {
                padding-bottom: 0;
                padding-top: 60px;
            }
        }

        .title-prompt {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(0.5rem, 2.5vw, 0.8rem);
            text-align: center;
            margin-bottom: 24px;
            letter-spacing: 1px;
            color: #ffd8ff;
            text-shadow: 0 0 10px rgba(255,101,163,0.5);
            animation: pulseText 1.5s infinite ease-in-out;
        }
        @keyframes pulseText {
            0%,100% { transform: scale(1); opacity: 0.85; }
            50%      { transform: scale(1.03); opacity: 1; color: #ffb4e8; }
        }

        .scene {
            position: relative;
            width: min(90vw, 320px);
            height: 220px;
            perspective: 1000px;
            overflow: visible;
        }

        .envelope-wrapper {
            position: relative;
            width: 100%; height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
            cursor: pointer;
        }
        .envelope-wrapper:hover { transform: translateY(-8px) scale(1.03); }
        .envelope-wrapper.open  { cursor: default; transform: translateY(20px); }

        .envelope-body {
            position: absolute;
            width: 100%; height: 100%;
            background-color: #ffb4e8;
            border: 8px solid #000;
            box-shadow: 0 12px 0 rgba(0,0,0,0.3);
            overflow: hidden;
            z-index: 2;
        }
        .envelope-body::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(45deg,  transparent 46%, #000 46%, #000 52%, transparent 52%),
                linear-gradient(-45deg, transparent 46%, #000 46%, #000 52%, transparent 52%);
            opacity: 0.25;
        }

        .pixel-heart-seal {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            width: 40px; height: 40px;
            background: #ff2151;
            z-index: 5;
            box-shadow:
                -8px -4px 0 #ff2151, -4px -8px 0 #ff2151,
                0 -8px 0 #ff2151,    4px -8px 0 #ff2151,
                8px -4px 0 #ff2151,
                -12px 0 0 #ff2151,   12px 0 0 #ff2151,
                -12px 4px 0 #ff2151, 12px 4px 0 #ff2151,
                -8px 8px 0 #ff2151,  8px 8px 0 #ff2151,
                -4px 12px 0 #ff2151, 4px 12px 0 #ff2151,
                0 16px 0 #ff2151;
            transition: opacity 0.3s, transform 0.3s;
        }
        .envelope-wrapper.open .pixel-heart-seal {
            opacity: 0;
            transform: translate(-50%,-50%) scale(0);
            pointer-events: none;
        }

        .envelope-flap {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #ffc2ed;
            border: 8px solid #000;
            border-bottom: none;
            clip-path: polygon(0% 0%, 100% 0%, 50% 50%);
            transform-origin: top center;
            z-index: 4;
            transition: transform 0.4s ease-in-out;
        }
        .envelope-wrapper.open .envelope-flap {
            transform: rotateX(180deg);
            z-index: 1;
            background-color: #e599cf;
        }

        .letter-card {
            position: absolute;
            bottom: 8px; left: 16px;
            width: calc(100% - 32px);
            height: calc(100% - 24px);
            background-color: #fff;
            border: 6px solid #000;
            padding: 16px;
            color: #000;
            z-index: 3;
            transform: translateY(0);
            transition: transform 0.5s cubic-bezier(0.175,0.885,0.32,1.275);
            display: flex;
            flex-direction: column;
            box-shadow: inset 4px 4px 0 #e6e6e6;
            font-family: 'Press Start 2P', monospace;
        }
        .envelope-wrapper.open .letter-card {
            transform: translateY(-160px);
            height: 260px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            z-index: 6;
        }

        .letter-title {
            font-size: 0.6rem;
            color: #ff2151;
            margin: 0 0 10px;
            text-align: center;
            line-height: 1.4;
            border-bottom: 4px dashed #000;
            padding-bottom: 8px;
        }
        .letter-text {
            font-size: 0.5rem;
            line-height: 1.8;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            white-space: pre-wrap;
            overflow-y: auto;
            flex-grow: 1;
        }

        .floating-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }
        .pixel-element {
            position: absolute;
            font-size: 1.6rem;
            opacity: 0;
            filter: drop-shadow(0 0 6px rgba(255,255,255,0.6));
            animation: floatUpLoop 7s infinite linear;
        }
        @keyframes floatUpLoop {
            0%   { transform: translateY(105vh) rotate(0deg); opacity: 0; }
            10%  { opacity: 0.8; }
            90%  { opacity: 0.8; }
            100% { transform: translateY(-15vh) translateX(40px) rotate(360deg); opacity: 0; }
        }
        @keyframes sparkRise {
            0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
            70%  { opacity: 0.8; }
            100% { transform: translateY(-120px) translateX(20px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="stars-bg"></div>

    <div class="page-grid">

        <!-- LEFT: FLOWER GARDEN -->
        <div class="left-flower-container">
            <div class="night"></div>
            <div class="dialogue-bubble bubble--1">happy birthday my love, yona 🎂</div>
            <div class="dialogue-bubble bubble--2">My meowmeoow, my posa</div>
            <div class="dialogue-bubble bubble--3">plus 1 <span>❤️</span></div>
            <div class="dialogue-bubble bubble--4">Gwapaaaaa</div>
            <div class="flowers">
                <div class="grass"></div>
                <div class="grass"></div>
                <div class="grass"></div>
                <div class="grass"></div>
                <div class="grass"></div>
                <div class="grass"></div>

                <div class="flower flower--1">
                    <div class="stem">
                        <div class="leaf-left"  style="bottom:70px"></div>
                        <div class="leaf-right" style="bottom:100px"></div>
                    </div>
                    <div class="petals">
                        <div class="petal"></div><div class="petal"></div>
                        <div class="petal"></div><div class="petal"></div>
                        <div class="petal"></div><div class="petal"></div>
                        <div class="flower-center"></div>
                    </div>
                    <div class="flower-light"></div>
                    <div class="flower-light"></div>
                    <div class="flower-light"></div>
                    <div class="flower-light"></div>
                </div>

                <div class="flower flower--2">
                    <div class="stem">
                        <div class="leaf-left"  style="bottom:55px"></div>
                        <div class="leaf-right" style="bottom:85px"></div>
                    </div>
                    <div class="petals">
                        <div class="petal"></div><div class="petal"></div>
                        <div class="petal"></div><div class="petal"></div>
                        <div class="petal"></div><div class="petal"></div>
                        <div class="flower-center"></div>
                    </div>
                    <div class="flower-light"></div>
                    <div class="flower-light"></div>
                </div>

                <div class="flower flower--3">
                    <div class="stem">
                        <div class="leaf-left"  style="bottom:60px"></div>
                        <div class="leaf-right" style="bottom:95px"></div>
                    </div>
                    <div class="petals">
                        <div class="petal"></div><div class="petal"></div>
                        <div class="petal"></div><div class="petal"></div>
                        <div class="petal"></div><div class="petal"></div>
                        <div class="flower-center"></div>
                    </div>
                    <div class="flower-light"></div>
                    <div class="flower-light"></div>
                </div>
            </div>
        </div>

        <!-- RIGHT: ENVELOPE -->
        <div class="right-envelope-container">
            <div class="title-prompt" id="promptText">▲ TAP ME!! ▲</div>
            <div class="scene">
                <div class="envelope-wrapper" id="pixelEnvelope" onclick="openEnvelope()">
                    <div class="envelope-flap"></div>
                    <div class="letter-card">
                        <div class="letter-title">🎂 HAPPY BIRTHDAY! 🎂</div>
                        <div class="letter-text" id="typewriterMessage"></div>
                    </div>
                    <div class="envelope-body">
                        <div class="pixel-heart-seal"></div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div class="floating-container" id="pixelRainContainer"></div>

    <script>
        const birthdayLetterContent = `Happy Birthday to my favorite person, my meowmeoow, loveee, yonaa! 🎉\n\nWishing you all the best on your special day! I hope you have a wonderful celebration! my meowmeow\n\nMeowmeoow, lovee! You mean the absolute world to me. ❤️✨\n\nEnjoy your special day!\n\n`;
        let envelopeOpened = false;
        let textIndex = 0;

        function openEnvelope() {
            if (envelopeOpened) return;
            envelopeOpened = true;
            document.getElementById('pixelEnvelope').classList.add('open');
            document.getElementById('promptText').textContent = "✨ MAKE A WISH! ✨";
            for (let i = 0; i < 15; i++) setTimeout(spawnPixelElement, i * 70);
            setTimeout(typeWriterAnimation, 50);

            // scroll so the letter card is fully visible on mobile
            setTimeout(() => {
                const scene = document.querySelector('.scene');
                if (scene) {
                    const top = scene.getBoundingClientRect().top + window.scrollY - 40;
                    window.scrollTo({ top: top, behavior: 'smooth' });
                }
            }, 200);
        }

        function typeWriterAnimation() {
            const el = document.getElementById('typewriterMessage');
            if (textIndex < birthdayLetterContent.length) {
                el.textContent += birthdayLetterContent.charAt(textIndex++);
                setTimeout(typeWriterAnimation, 18);
            }
        }

        const pixelIcons = ['❤️','🎂','✨','🎈','🎁','💖','⭐'];
        const rainContainer = document.getElementById('pixelRainContainer');

        function spawnPixelElement() {
            const el = document.createElement('div');
            el.className = 'pixel-element';
            el.textContent = pixelIcons[Math.floor(Math.random() * pixelIcons.length)];
            el.style.left = Math.random() * 95 + 'vw';
            el.style.fontSize = (Math.random() * 1.2 + 1) + 'rem';
            el.style.animationDuration = (Math.random() * 4 + 4) + 's';
            rainContainer.appendChild(el);
            setTimeout(() => el.remove(), 7000);
        }

        setInterval(spawnPixelElement, 450);

        window.addEventListener('click', (e) => {
            if (!envelopeOpened) return;
            if (e.target.closest('.letter-card') || e.target.closest('.left-flower-container')) return;
            for (let i = 0; i < 6; i++) {
                const spark = document.createElement('div');
                spark.className = 'pixel-element';
                spark.textContent = pixelIcons[Math.floor(Math.random() * pixelIcons.length)];
                spark.style.left = (e.clientX + (Math.random() * 60 - 30)) + 'px';
                spark.style.top = e.clientY + 'px';
                spark.style.animation = 'floatUpLoop 3s forwards linear';
                rainContainer.appendChild(spark);
                setTimeout(() => spark.remove(), 3000);
            }
        });
    </script>
</body>
</html>
